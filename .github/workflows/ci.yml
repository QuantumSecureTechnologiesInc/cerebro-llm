name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

jobs:
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install lint dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff==0.5.0 mypy==1.10.0

      - name: Ruff (lint)
        run: ruff check cerebro/ --output-format=github

      - name: Ruff (format check)
        run: ruff format --check cerebro/
        continue-on-error: true

      - name: Mypy (type check)
        run: mypy cerebro/ --ignore-missing-imports --no-strict-optional
        continue-on-error: true

  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install -e ".[dev]" || pip install -e .
          pip install pytest pytest-cov pytest-xdist

      - name: Run tests
        env:
          CEREBRO_DEVICE: cpu
          PYTHONHASHSEED: "0"
        run: |
          pytest tests/ -q --tb=short -x --maxfail=5 \
            --cov=cerebro --cov-report=xml --cov-report=term \
            -p no:cacheprovider

      - name: Upload coverage
        if: matrix.python-version == '3.11'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install security tools
        run: |
          python -m pip install --upgrade pip
          pip install bandit safety pip-audit

      - name: Bandit (static security scan)
        run: bandit -r cerebro/ -ll -i --skip B101,B404,B603
        continue-on-error: true

      - name: pip-audit (dependency vulnerabilities)
        run: pip-audit --requirement pyproject.toml --strict || true
        continue-on-error: true

  pqc-verify:
    name: PQC Integration Verification
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install PQC deps
        run: |
          python -m pip install --upgrade pip
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install -e . || true
          pip install pytest liboqs-python || echo "liboqs-python unavailable; PQC tests will skip"

      - name: Run PQC tests
        run: pytest tests/ -q -k "pqc or security or auth or encryption" --tb=short
        continue-on-error: true
