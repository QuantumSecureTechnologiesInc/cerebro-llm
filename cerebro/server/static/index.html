<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cerebro Chat</title>
<style>
:root {
  --bg: #0f0f14;
  --surface: #1a1a24;
  --surface2: #242438;
  --border: #2a2a40;
  --text: #e4e4f0;
  --text2: #8888a8;
  --accent: #6c5ce7;
  --accent2: #a29bfe;
  --danger: #e74c3c;
  --success: #2ecc71;
  --warning: #f39c12;
  --radius: 12px;
  --shadow: 0 2px 12px rgba(0,0,0,.3);
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
  background: var(--bg);
  color: var(--text);
  height: 100vh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}
header {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 12px 20px;
  display: flex;
  align-items: center;
  gap: 12px;
  flex-shrink: 0;
}
header h1 {
  font-size: 18px;
  font-weight: 600;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}
header .status {
  font-size: 12px;
  padding: 4px 10px;
  border-radius: 100px;
  background: var(--surface2);
  color: var(--text2);
  margin-left: auto;
}
header .status.connected {
  background: rgba(46, 204, 113, .15);
  color: var(--success);
}
header .status.disconnected {
  background: rgba(231, 76, 60, .15);
  color: var(--danger);
}

#chat {
  flex: 1;
  overflow-y: auto;
  padding: 20px;
  display: flex;
  flex-direction: column;
  gap: 16px;
  scroll-behavior: smooth;
}
.message {
  display: flex;
  gap: 12px;
  max-width: 85%;
  animation: fadeIn .3s ease;
}
.message.user {
  align-self: flex-end;
  flex-direction: row-reverse;
}
.message.assistant {
  align-self: flex-start;
}
.avatar {
  width: 36px;
  height: 36px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 16px;
  flex-shrink: 0;
}
.message.user .avatar {
  background: var(--accent);
  color: white;
}
.message.assistant .avatar {
  background: var(--surface2);
  color: var(--accent2);
}
.bubble {
  padding: 12px 16px;
  border-radius: var(--radius);
  line-height: 1.6;
  white-space: pre-wrap;
  word-break: break-word;
}
.message.user .bubble {
  background: var(--accent);
  color: white;
  border-bottom-right-radius: 4px;
}
.message.assistant .bubble {
  background: var(--surface);
  border: 1px solid var(--border);
  border-bottom-left-radius: 4px;
}
.bubble code {
  background: rgba(0,0,0,.2);
  padding: 2px 6px;
  border-radius: 4px;
  font-size: 13px;
}
.bubble pre {
  background: rgba(0,0,0,.3);
  padding: 12px;
  border-radius: 8px;
  overflow-x: auto;
  margin: 8px 0;
}
.message.user .bubble pre,
.message.user .bubble code {
  background: rgba(0,0,0,.3);
}
.typing .bubble {
  color: var(--text2);
}
.typing .bubble::after {
  content: '▊';
  animation: blink 1s infinite;
}
@keyframes blink { 50% { opacity: 0; } }
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}

#input-area {
  background: var(--surface);
  border-top: 1px solid var(--border);
  padding: 16px 20px;
  display: flex;
  gap: 12px;
  flex-shrink: 0;
}
#input-area textarea {
  flex: 1;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  color: var(--text);
  padding: 12px 16px;
  font-size: 14px;
  font-family: inherit;
  resize: none;
  outline: none;
  min-height: 48px;
  max-height: 200px;
  transition: border-color .2s;
}
#input-area textarea:focus {
  border-color: var(--accent);
}
#input-area button {
  background: var(--accent);
  color: white;
  border: none;
  border-radius: var(--radius);
  padding: 12px 24px;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  transition: background .2s, transform .1s;
  white-space: nowrap;
}
#input-area button:hover {
  background: var(--accent2);
}
#input-area button:active {
  transform: scale(.97);
}
#input-area button:disabled {
  background: var(--surface2);
  color: var(--text2);
  cursor: not-allowed;
}

.toolbar {
  display: flex;
  gap: 8px;
  padding: 0 20px 8px;
  flex-shrink: 0;
}
.toolbar button {
  background: var(--surface);
  border: 1px solid var(--border);
  color: var(--text2);
  border-radius: 8px;
  padding: 6px 12px;
  font-size: 12px;
  cursor: pointer;
  transition: all .2s;
}
.toolbar button:hover {
  background: var(--surface2);
  color: var(--text);
}
.toolbar button.active {
  background: var(--accent);
  border-color: var(--accent);
  color: white;
}

.settings-panel {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 16px;
  margin: 0 20px 8px;
  display: none;
  gap: 12px;
  flex-wrap: wrap;
  flex-shrink: 0;
}
.settings-panel.show { display: flex; }
.settings-panel label {
  font-size: 12px;
  color: var(--text2);
  display: flex;
  flex-direction: column;
  gap: 4px;
}
.settings-panel input[type="range"] {
  accent-color: var(--accent);
  width: 100px;
}
.settings-panel input[type="number"] {
  background: var(--surface2);
  border: 1px solid var(--border);
  color: var(--text);
  border-radius: 6px;
  padding: 4px 8px;
  width: 70px;
  font-size: 13px;
}
.settings-panel .value {
  font-size: 11px;
  color: var(--accent2);
}
</style>
</head>
<body>

<header>
  <h1>🧠 Cerebro Chat</h1>
  <span id="status" class="status disconnected">Disconnected</span>
</header>

<div id="chat">
  <div class="message assistant">
    <div class="avatar">🧠</div>
    <div class="bubble">Hello! I'm Cerebro — your AI assistant. How can I help you today?</div>
  </div>
</div>

<div class="settings-panel" id="settings">
  <label>Temperature
    <input type="range" id="temperature" min="0" max="2" step="0.1" value="0.7">
    <span class="value" id="temp-val">0.7</span>
  </label>
  <label>Top-p
    <input type="range" id="top-p" min="0" max="1" step="0.05" value="0.9">
    <span class="value" id="topp-val">0.9</span>
  </label>
  <label>Top-k
    <input type="number" id="top-k" min="1" max="200" value="50">
  </label>
  <label>Max Tokens
    <input type="number" id="max-tokens" min="1" max="4096" value="1024">
  </label>
</div>

<div class="toolbar">
  <button id="btn-settings" onclick="toggleSettings()">⚙ Settings</button>
  <button onclick="clearChat()">🗑 Clear</button>
  <button id="btn-mode" onclick="toggleMode()">✏ Stream</button>
</div>

<div id="input-area">
  <textarea id="prompt" rows="1" placeholder="Type a message..."
    onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendMessage()}"></textarea>
  <button id="send-btn" onclick="sendMessage()">Send</button>
</div>

<script>
const API_BASE = window.location.origin;
let ws = null;
let streamMode = true;
let isConnected = false;

function setStatus(text, connected) {
  const el = document.getElementById('status');
  el.textContent = text;
  el.className = 'status ' + (connected ? 'connected' : 'disconnected');
}

function toggleSettings() {
  document.getElementById('settings').classList.toggle('show');
}

function toggleMode() {
  streamMode = !streamMode;
  document.getElementById('btn-mode').textContent = streamMode ? '✏ Stream' : '▶ Batch';
}

function clearChat() {
  const chat = document.getElementById('chat');
  chat.innerHTML = '';
  addMessage('assistant', 'Chat cleared. How can I help?');
}

function addMessage(role, text) {
  const chat = document.getElementById('chat');
  const div = document.createElement('div');
  div.className = 'message ' + role;
  div.innerHTML = `
    <div class="avatar">${role === 'user' ? '👤' : '🧠'}</div>
    <div class="bubble">${escapeHtml(text)}</div>`;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
  return div;
}

function escapeHtml(text) {
  const div = document.createElement('div');
  div.textContent = text;
  return div.innerHTML;
}

async function sendMessage() {
  const input = document.getElementById('prompt');
  const text = input.value.trim();
  if (!text) return;

  input.value = '';
  input.style.height = 'auto';
  addMessage('user', text);

  const msgDiv = addMessage('assistant', '');
  msgDiv.classList.add('typing');
  const bubble = msgDiv.querySelector('.bubble');

  const btn = document.getElementById('send-btn');
  btn.disabled = true;

  const params = {
    prompt: text,
    temperature: parseFloat(document.getElementById('temperature').value),
    top_p: parseFloat(document.getElementById('top-p').value),
    top_k: parseInt(document.getElementById('top-k').value),
    max_new_tokens: parseInt(document.getElementById('max-tokens').value),
    stream: streamMode,
  };

  try {
    if (streamMode) {
      await streamChat(params, bubble, msgDiv);
    } else {
      await batchChat(params, bubble, msgDiv);
    }
  } catch (err) {
    bubble.textContent = 'Error: ' + err.message;
    setStatus('Error', false);
  } finally {
    msgDiv.classList.remove('typing');
    btn.disabled = false;
  }
}

async function batchChat(params, bubble, msgDiv) {
  const resp = await fetch(API_BASE + '/v1/chat/completions', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      messages: [{ role: 'user', content: params.prompt }],
      temperature: params.temperature,
      top_p: params.top_p,
      max_tokens: params.max_new_tokens,
    }),
  });
  if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
  const data = await resp.json();
  bubble.textContent = data.choices?.[0]?.message?.content || JSON.stringify(data);
}

async function streamChat(params, bubble, msgDiv) {
  const resp = await fetch(API_BASE + '/v1/completions/stream', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(params),
  });
  if (!resp.ok) throw new Error(`HTTP ${resp.status}`);

  const reader = resp.body.getReader();
  const decoder = new TextDecoder();
  let fullText = '';

  while (true) {
    const { done, value } = await reader.read();
    if (done) break;
    const chunk = decoder.decode(value, { stream: true });
    const lines = chunk.split('\n');
    for (const line of lines) {
      if (line.startsWith('data: ')) {
        const data = line.slice(6);
        if (data === '[DONE]') continue;
        try {
          const json = JSON.parse(data);
          const token = json.token || json.choices?.[0]?.delta?.content || '';
          fullText += token;
          bubble.textContent = fullText;
          msgDiv.parentElement.scrollTop = msgDiv.parentElement.scrollHeight;
        } catch (e) {}
      }
    }
  }
}

// Auto-resize textarea
document.getElementById('prompt').addEventListener('input', function() {
  this.style.height = 'auto';
  this.style.height = Math.min(this.scrollHeight, 200) + 'px';
});

// Settings live updates
['temperature', 'top-p'].forEach(id => {
  const el = document.getElementById(id);
  const val = document.getElementById(id.replace('-', '') + '-val');
  if (val) el.addEventListener('input', () => val.textContent = el.value);
});

// Check connection on load
async function checkConnection() {
  try {
    const resp = await fetch(API_BASE + '/health');
    if (resp.ok) {
      isConnected = true;
      setStatus('Connected', true);
    }
  } catch (e) {
    setStatus('Disconnected', false);
  }
}
checkConnection();
setInterval(checkConnection, 30000);
</script>
</body>
</html>
